[project]
name = "miurcache"
version = "0.1.0"
description = "Resident DOM/cache state and persistence boundary for miur."
readme = "README.rst"
requires-python = ">=3.14"  #  "==3.14.*"
license = "GPL-3.0-only"
dependencies = ["miurcore"]

[project.scripts]
miurcache = "miurcache:main"

[project.optional-dependencies]
lmdb = ["lmdb>=1.7"]

[tool.uv.sources]
miurcore = { workspace = true }

# USAGE: $ uv build
[build-system]
# requires = ["uv_build>=0.11.7,<0.12"]
# build-backend = "uv_build"
# requires = ["hatchling>=1.27"]
# build-backend = "hatchling.build"
# requires = ["setuptools>=68"]
# build-backend = "setuptools.build_meta"
requires = ["scikit-build-core>=0.10", "conan"]  # , "pybind11"
build-backend = "scikit_build_core.build"

